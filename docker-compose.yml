services:
  app:
    image: dongho18/connect-gnu-node:latest
    pull_policy: always
    restart: always
    expose:
      - '3000'
    env_file:
      - .env
    networks:
      - connect-gnu-network
    logging:
      driver: gcplogs
      options:
        gcp-log-cmd: 'true'

  nginx:
    image: nginx:1.29.5-alpine
    restart: always
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./infra/nginx/prod.conf:/etc/nginx/conf.d/default.conf
      - ./infra/certbot/conf:/etc/letsencrypt
      - ./infra/certbot/www:/var/www/certbot
    command: '/bin/sh -c ''while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g "daemon off;"'''
    networks:
      - connect-gnu-network
    depends_on:
      - app
    logging:
      driver: gcplogs
      options:
        gcp-log-cmd: 'true'

  prometheus:
    image: prom/prometheus:v3.10.0
    restart: always
    expose:
      - '9090'
    environment:
      - SUPABASE_HOST=${SUPABASE_HOST}
      - SUPABASE_METRICS_PASSWORD=${SUPABASE_METRICS_PASSWORD}
    entrypoint:
      - /bin/sh
      - -c
      - |
        sed \
          -e "s/__SUPABASE_HOST__/$$SUPABASE_HOST/g" \
          -e "s/__SUPABASE_METRICS_PASSWORD__/$$SUPABASE_METRICS_PASSWORD/g" \
          /etc/prometheus/prometheus.yml.template > /etc/prometheus/prometheus.yml && \
        /bin/prometheus \
          --config.file=/etc/prometheus/prometheus.yml \
          --storage.tsdb.path=/prometheus \
          --web.external-url=${PROMETHEUS_EXTERNAL_URL} \
          --web.route-prefix=/
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml.template
      - prometheus_data:/prometheus
    networks:
      - connect-gnu-network
    depends_on:
      - app
    logging:
      driver: gcplogs
      options:
        gcp-log-cmd: 'true'

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.5.1
    restart: always
    command: --nginx.scrape-uri=http://nginx:8080/nginx_status
    expose:
      - '9113'
    networks:
      - connect-gnu-network
    depends_on:
      - nginx
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  certbot:
    image: certbot/certbot:v5.3.1
    restart: on-failure
    volumes:
      - ./infra/certbot/conf:/etc/letsencrypt
      - ./infra/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

networks:
  connect-gnu-network:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
