services:
  backend_node_server:
    build: .
    image: dongho18/connect-gnu-node:latest
    container_name: backend_node_server
    restart: always
    networks:
      - connect-gnu-network
    ports:
      - '5200:5200'
    environment:
      TZ: 'Asia/Seoul'
      SLACK_WEBHOOK: ${SLACK_WEBHOOK}
      SENTRY_NODE_DSN: ${SENTRY_NODE_DSN}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      deploy:
        resources:
          limits:
            memory: 512Mi
            cpus: '0.5'
          reservations:
            memory: 256Mi
            cpus: '0.25'

networks:
  connect-gnu-network:
    external: true
