services:
  app:
    image: dongho18/connect-gnu-node:latest
    pull_policy: always
    restart: always
    expose:
      - '3000'
    env_file:
      - .env
    networks:
      - connect-gnu-network
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 512m

  nginx:
    image: nginx:1.29.5-alpine
    restart: always
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./infra/nginx/prod.conf:/etc/nginx/conf.d/default.conf
      - ./infra/certbot/conf:/etc/letsencrypt
      - ./infra/certbot/www:/var/www/certbot
    command: '/bin/sh -c ''while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g "daemon off;"'''
    networks:
      - connect-gnu-network
    depends_on:
      - app

  prometheus:
    image: prom/prometheus:v3.10.0
    restart: always
    expose:
      - '9090'
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.external-url=${PROMETHEUS_EXTERNAL_URL}'
      - '--web.route-prefix=/'
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - connect-gnu-network
    depends_on:
      - app

  grafana:
    image: grafana/grafana:12.3
    restart: always
    expose:
      - '3000'
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
      - GF_SERVER_ROOT_URL=${GF_SERVER_ROOT_URL}
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - connect-gnu-network
    depends_on:
      - prometheus

  certbot:
    image: certbot/certbot:v5.3.1
    restart: on-failure
    volumes:
      - ./infra/certbot/conf:/etc/letsencrypt
      - ./infra/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

networks:
  connect-gnu-network:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
