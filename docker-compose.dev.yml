services:
  nginx:
    image: nginx:alpine
    container_name: connectgnu_nginx
    ports:
      - '80:80'
    volumes:
      - ./infra/nginx/dev.conf:/etc/nginx/conf.d/default.conf
    networks:
      - connect-gnu-network
    depends_on:
      - app

  app:
    container_name: connectgnu_app
    build:
      context: .
      target: dev
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - '3000:3000'
    networks:
      - connect-gnu-network

  prometheus:
    image: prom/prometheus
    container_name: connectgnu_prometheus
    ports:
      - '9090:9090'
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - connect-gnu-network
    depends_on:
      - app

  grafana:
    image: grafana/grafana
    container_name: connectgnu_grafana
    ports:
      - '3002:3000'
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-admin}
    networks:
      - connect-gnu-network
    depends_on:
      - prometheus

networks:
  connect-gnu-network:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
