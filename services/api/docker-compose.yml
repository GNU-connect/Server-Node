services:
  app:
    image: dongho18/connect-gnu-node:latest
    pull_policy: always
    restart: always
    expose:
      - "3000"
    env_file:
      - .env
    networks:
      - connect-gnu-network
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3000/api/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 20s
    logging:
      driver: gcplogs
      options:
        gcp-log-cmd: "true"

  nginx:
    image: nginx:1.29.5-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf
      - ./letsencrypt/conf:/etc/letsencrypt
      - ./letsencrypt/www:/var/www/certbot
    command: '/bin/sh -c ''while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g "daemon off;"'''
    networks:
      - connect-gnu-network
    depends_on:
      - app
    logging:
      driver: gcplogs
      options:
        gcp-log-cmd: "true"

  certbot:
    image: certbot/certbot:v5.3.1
    restart: on-failure
    volumes:
      - ./letsencrypt/conf:/etc/letsencrypt
      - ./letsencrypt/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  connect-gnu-network:
    driver: bridge
