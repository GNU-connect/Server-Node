global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # - "first.rules"
  # - "second.rules"

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['prometheus:9090']
    metrics_path: /metrics

  - job_name: app
    static_configs:
      - targets: ['app:3000']
    metrics_path: /api/metrics
