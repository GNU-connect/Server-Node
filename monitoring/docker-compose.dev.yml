services:
  prometheus:
    image: prom/prometheus:v3.10.0
    expose:
      - '9090'
    environment:
      - SUPABASE_HOST=${SUPABASE_HOST:-}
      - SUPABASE_METRICS_PASSWORD=${SUPABASE_METRICS_PASSWORD:-}
    entrypoint:
      - /bin/sh
      - -c
      - |
        sed \
          -e "s/__SUPABASE_HOST__/$$SUPABASE_HOST/g" \
          -e "s/__SUPABASE_METRICS_PASSWORD__/$$SUPABASE_METRICS_PASSWORD/g" \
          /etc/prometheus/prometheus.yml.template > /etc/prometheus/prometheus.yml && \
        /bin/prometheus \
          --config.file=/etc/prometheus/prometheus.yml \
          --storage.tsdb.path=/prometheus \
          --web.external-url=${PROMETHEUS_EXTERNAL_URL:-http://localhost/prometheus/} \
          --web.route-prefix=/
    volumes:
      - ./prometheus/prometheus.dev.yml:/etc/prometheus/prometheus.yml.template
      - prometheus_data:/prometheus
    networks:
      - monitoring-network

  grafana:
    image: grafana/grafana:12.3
    expose:
      - '3000'
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-admin}
      - GF_SERVER_ROOT_URL=${GF_SERVER_ROOT_URL:-http://localhost/grafana}
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_DATABASE=${DB_DATABASE}
    networks:
      - monitoring-network

  nginx:
    image: nginx:1.29.5-alpine
    ports:
      - '8080:80'
    volumes:
      - ./nginx/dev.conf:/etc/nginx/conf.d/default.conf
    networks:
      - monitoring-network
    depends_on:
      - grafana
      - prometheus

networks:
  monitoring-network:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
