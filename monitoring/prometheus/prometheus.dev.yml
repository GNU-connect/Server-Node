global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # - "first.rules"
  # - "second.rules"

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
    metrics_path: /metrics

  - job_name: app
    static_configs:
      - targets: ['host.docker.internal:3000']
    metrics_path: /api/metrics

  - job_name: supabase_db
    scheme: https
    metrics_path: /customer/v1/privileged/metrics
    basic_auth:
      username: service_role
      password: __SUPABASE_METRICS_PASSWORD__
    static_configs:
      - targets: ['__SUPABASE_HOST__']
        labels:
          group: supabase_db
