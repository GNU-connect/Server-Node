upstream prometheus {
  server prometheus:9090;
}

upstream grafana {
  server grafana:3000;
}

# HTTP 설정
server {
  listen 80;
  server_name monitor.connectgnu.kro.kr;

  location / {
    return 301 https://$host$request_uri;
  }

  # Let's Encrypt 인증서 발급을 위한 설정
  location /.well-known/acme-challenge/ {
    allow all;
    root /var/www/certbot;
  }
}

# HTTPS 설정
server {
  listen 443 ssl;
  http2 on;
  server_name monitor.connectgnu.kro.kr;

  # SSL 인증서 설정
  ssl_certificate /etc/letsencrypt/live/monitor.connectgnu.kro.kr/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/monitor.connectgnu.kro.kr/privkey.pem;

  # SSL 보안 설정
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

  location /grafana/api/live/ws {
    proxy_pass http://grafana;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Host $http_host;
  }

  location /grafana {
    proxy_pass http://grafana;
    proxy_pass_request_headers    on;
    proxy_set_header X-Forwarded-For             $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Host $http_host;
    proxy_set_header X-NginX-Proxy true;
  }

  location /prometheus/ {
    proxy_pass http://prometheus/;
    proxy_pass_request_headers    on;
    proxy_set_header X-Forwarded-For             $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Host $http_host;
    proxy_set_header X-NginX-Proxy true;
  }

  location = /prometheus {
    return 301 $scheme://$host/prometheus/;
  }

  location / {
    deny all;
  }
}
