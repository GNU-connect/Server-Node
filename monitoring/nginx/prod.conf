# HTTP 설정
server {
  listen 80;
  server_name monitor.connectgnu.kro.kr;
  underscores_in_headers    on;

  location / {
    #return 301 https://$host$request_uri;
    return 200 "ok";
  }

  # Let's Encrypt 인증서 발급을 위한 설정
  location /.well-known/acme-challenge/ {
    allow all;
    root /var/www/certbot;
  }
}

