services:
  prometheus:
    image: prom/prometheus:v3.10.0
    restart: always
    expose:
      - "9090"
    environment:
      - SUPABASE_HOST=${SUPABASE_HOST}
      - SUPABASE_METRICS_PASSWORD=${SUPABASE_METRICS_PASSWORD}
    entrypoint:
      - /bin/sh
      - -c
      - |
        sed \
          -e "s/__SUPABASE_HOST__/$$SUPABASE_HOST/g" \
          -e "s/__SUPABASE_METRICS_PASSWORD__/$$SUPABASE_METRICS_PASSWORD/g" \
          /etc/prometheus/prometheus.yml.template > /etc/prometheus/prometheus.yml && \
        /bin/prometheus \
          --config.file=/etc/prometheus/prometheus.yml \
          --storage.tsdb.path=/prometheus \
          --web.external-url=${PROMETHEUS_EXTERNAL_URL} \
          --web.route-prefix=/
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml.template
      - prometheus_data:/prometheus
    networks:
      - monitoring-network
    logging:
      driver: gcplogs
      options:
        gcp-log-cmd: "true"

  grafana:
    image: grafana/grafana:12.3
    restart: always
    expose:
      - "3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
      - GF_SERVER_ROOT_URL=${GF_SERVER_ROOT_URL}
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_DATABASE=${DB_DATABASE}
    networks:
      - monitoring-network
    depends_on:
      - prometheus
    logging:
      driver: gcplogs
      options:
        gcp-log-cmd: "true"

  nginx:
    image: nginx:1.29.5-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf
      - ./letsencrypt/conf:/etc/letsencrypt
      - ./letsencrypt/www:/var/www/certbot
    command: '/bin/sh -c ''while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g "daemon off;"'''
    networks:
      - monitoring-network
    depends_on:
      - grafana
      - prometheus
    logging:
      driver: gcplogs
      options:
        gcp-log-cmd: "true"

  certbot:
    image: certbot/certbot:v5.3.1
    restart: on-failure
    volumes:
      - ./letsencrypt/conf:/etc/letsencrypt
      - ./letsencrypt/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  monitoring-network:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
